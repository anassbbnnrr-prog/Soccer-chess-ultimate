<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Chess Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #3498db;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin: 15px 0 5px 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        #statusMsg {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 10px 20px;
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
        }

        canvas {
            background-color: #21262d;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid #30363d;
            cursor: pointer;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 250px;
        }

        .card {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
            text-align: center;
        }

        button {
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background-color: var(--accent-color);
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .piece-btn {
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            background-color: #30363d;
            border: 2px solid transparent;
        }

        .piece-btn:hover {
            background-color: #484f58;
        }

        .piece-btn.active {
            border-color: var(--success-color);
            background-color: #1e2e1e;
        }

        #menuCard button {
            width: 100%;
            margin: 5px 0;
        }

        #coinFlipBtn {
            background-color: var(--success-color);
            display: none; 
            width: 100%;
        }

        #endTurnBtn {
            background-color: var(--danger-color);
            width: 100%;
        }
        
        #controls {
            display: none; 
            width: 100%;
        }
        #aiStyleLabel {
            font-size: 0.95rem;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 6px;
            background: linear-gradient(135deg, #1e2e1e, #162228);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            display: none;
            text-align: center;
            margin-top: 5px;
        }
        #playVsAIPawnBtn { background-color: #8e44ad; }
    </style>
</head>
<body>

    <h1>⚽ Soccer Chess Ultimate ♚</h1>
    <div id="statusMsg">الرجاء اختيار طور اللعب للبدء</div>

    <div class="main-container">
        
        <div>
            <canvas id="gameBoard"></canvas>
        </div>

        <div class="side-panel">
            
            <div class="card" id="menuCard">
                <h3>أطوار اللعب</h3>
                <button id="onlyMoveBtn">ONLY_MOVE (لعب ضد صديق)</button>
                <button id="pawnModeBtn">طور البيادق (Pawn Mode)</button>
                <button id="playVsAIBtn">اللعب ضد الكمبيوتر (AI)</button>
                <button id="playVsAIPawnBtn">طور البيادق ضد الكمبيوتر 🤖</button>
                <button id="aiVsAiBtn" style="background:linear-gradient(135deg,#2c3e50,#8e44ad);width:100%;margin-top:5px">🤖 AI ضد AI (استحواذ vs مرتدة)</button>
            </div>

            <button id="coinFlipBtn">بدء التوزيع</button>

            <div class="card" id="setup-overlay" style="display: none;">
                <h3>اختر القطعة للتوزيع</h3>
                <p id="setup-hint" style="font-size: 0.9rem; color: #8b949e;">اختر القطع لتوزيعها في نصف ملعبك.</p>
                <div id="piece-buttons-container">
                    <button class="piece-btn" data-type="Q" title="ملكة">♛</button>
                    <button class="piece-btn" data-type="R" title="رخ">♜</button>
                    <button class="piece-btn" data-type="B" title="فيل">♝</button>
                    <button class="piece-btn" data-type="N" title="حصان">♞</button>
                    <button class="piece-btn" data-type="P" title="بيدق عادي">♟</button>
                    <button class="piece-btn" data-type="S" title="بيدق مميز ✨">✨♟</button>
                </div>
            </div>

            <div class="card" id="controls">
                <h3>التحكم</h3>
                <button id="endTurnBtn">إنهاء الدور الحالي</button>
                <button id="toggleUnsafeBtn" style="background:#6c3483;width:100%;margin-top:6px">🔴 إظهار المربعات الخطرة</button>
                <button id="backToMenuBtn" style="background:#555;width:100%;margin-top:6px">🏠 القائمة الرئيسية</button>
                <div id="aiStyleLabel"></div>
                <div id="aiVsAiStatus" style="display:none;font-size:0.85rem;color:#8b949e;padding:6px;text-align:center;border-top:1px solid #30363d;margin-top:6px"></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
